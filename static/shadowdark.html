<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadowdark — Листы персонажей</title>
  <link rel="stylesheet" href="/css/fonts.css" />
  <link rel="stylesheet" href="/css/shadowdark.css" />
</head>
<body>
  <!-- ===== Экран входа в кампанию ===== -->
  <section id="screen-campaign" class="screen">
    <div class="join-card">
      <div class="wordmark">
        <h1 class="title">Shadowdark</h1>
      </div>

      <label class="field">
        <span>ID кампании</span>
        <input id="campaign-input" type="text" placeholder="gloomy-dungeon"
               autocomplete="off" spellcheck="false" maxlength="128" />
      </label>
      <p class="hint">Буквы, цифры, <code>-</code> и <code>_</code>. Поделись этим ID с пати.</p>

      <div class="row gap">
        <button id="btn-open" class="btn primary">Открыть</button>
        <button id="btn-create" class="btn">Создать новую</button>
      </div>
      <p id="campaign-error" class="error" hidden></p>
    </div>
  </section>

  <!-- ===== Доска кампании ===== -->
  <section id="screen-board" class="screen" hidden data-view="list">
    <header class="board-header">
      <div class="row gap center">
        <button id="btn-leave" class="btn ghost" title="Выйти к выбору кампании">&larr;</button>
        <div>
          <div class="muted small">Кампания</div>
          <div id="board-campaign-id" class="campaign-id"></div>
        </div>
      </div>
      <div class="row gap center">
        <span id="conn-status" class="conn" title="Состояние синхронизации">
          <span class="dot"></span><span class="conn-label">офлайн</span>
        </span>
      </div>
    </header>

    <div class="workspace">
      <!-- Левая панель: список персонажей -->
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>Пати</h2>
          <button id="btn-new-char" class="btn primary small">+ Персонаж</button>
        </div>
        <ul id="char-list" class="char-list"></ul>
        <p id="list-empty" class="muted small list-empty" hidden>
          Пока пусто. Создай первого персонажа.
        </p>
      </aside>

      <!-- Правая панель: лист выбранного персонажа -->
      <section class="sheet-pane">
        <div id="sheet-empty" class="sheet-empty muted">
          <span class="se-mark" aria-hidden="true">✦</span>
          <p>Выбери персонажа слева или создай нового.</p>
        </div>

        <div id="sheet-wrap" class="sheet-wrap" hidden>
          <div class="sheet-toolbar">
            <div class="row gap center">
              <button id="btn-back" class="btn ghost back-btn" title="К списку">&larr;</button>
              <div id="sheet-mode-badge" class="badge"></div>
            </div>
            <div class="row gap center">
              <div id="dice-tray" class="dice-tray" title="Бросить куб"></div>
              <button id="btn-edit" class="btn" hidden>Редактировать</button>
              <button id="btn-save" class="btn primary" hidden>Сохранить</button>
              <button id="btn-delete" class="btn danger" hidden>Удалить</button>
            </div>
          </div>
          <p id="sheet-error" class="error" hidden></p>
          <form id="sheet-form" class="sheet-form" autocomplete="off"></form>
        </div>
      </section>
    </div>
  </section>

  <!-- ===== Диалог пароля ===== -->
  <div id="pwd-overlay" class="overlay" hidden>
    <div class="pwd-dialog" role="dialog" aria-modal="true">
      <h2 id="pwd-title">Пароль персонажа</h2>
      <p id="pwd-desc" class="muted small"></p>
      <input id="pwd-input" type="password" placeholder="пароль" autocomplete="off" />
      <p id="pwd-error" class="error" hidden></p>
      <div class="row gap end">
        <button id="pwd-cancel" class="btn ghost">Отмена</button>
        <button id="pwd-ok" class="btn primary">Ок</button>
      </div>
    </div>
  </div>

  <!-- ===== Тост броска кубов ===== -->
  <div id="dice-toast" class="dice-toast" hidden></div>

  <script src="/config.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
